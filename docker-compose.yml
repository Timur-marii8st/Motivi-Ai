services:
  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
      - singbox
    expose:
      - "8000"
    volumes:
      - .:/app
      - shared_files:/tmp/motivi_files
      # Shared temp directory for code execution file output.
      # The app creates per-execution subdirs here; Docker mounts them into sandbox containers.
      # Must be the SAME path on the host and inside the app container so that
      # `-v /tmp/motivi_exec/UUID:/output` in `docker run` resolves correctly on the host.
      - /tmp/motivi_exec:/tmp/motivi_exec
    command: >
      bash -lc "poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    networks:
      - motivi-network

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: motivi
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - motivi-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - motivi-network

  # ── sing-box VPN proxy (bypasses Telegram API blocks by RKN) ──
  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    command: run -c /etc/sing-box/config.json
    volumes:
      - ./singbox/config.json:/etc/sing-box/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://cp.cloudflare.com/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - motivi-network

  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./npm_data:/data
      - ./npm_letsencrypt:/etc/letsencrypt
    networks:
      - motivi-network

volumes:
  dbdata:
  shared_files:
  redis_data:
  npm_data:
  npm_letsencrypt:

networks:
  motivi-network:
    driver: bridge
